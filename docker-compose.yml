services:
  postgres:
    image: postgres:17-alpine
    container_name: samsara-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: samsara
      POSTGRES_USER: samsara
      POSTGRES_PASSWORD: samsara_password
    ports:
      - "5432:5432"
    volumes:
      - samsara-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samsara -d samsara"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  samsara-postgres-data:
